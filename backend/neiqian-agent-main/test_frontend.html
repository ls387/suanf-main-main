<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教务智能助手</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        #ai-chatbot-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
            transition: all 0.3s ease;
        }

        .chat-header {
            background: #1890ff;
            color: white;
            padding: 15px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 10px;
            max-width: 80%;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot-msg {
            background: white;
            align-self: flex-start;
            border: 1px solid #e0e0e0;
            margin-right: auto;
        }

        .user-msg {
            background: #1890ff;
            color: white;
            margin-left: auto;
        }

        .message-container { display: flex; flex-direction: column; }

        .chat-input {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        .chat-input button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .chat-input button:hover { background: #096dd9; }
        
        /* 加载动画提示 */
        .loading { color: #888; font-size: 12px; margin-bottom:10px; text-align: left; display: none; }
    </style>
</head>
<body>

    <!-- 模拟你们排课系统的页面背景 -->
    <div style="padding: 50px;">
        <h1>您的排课系统门户</h1>
        <p>页面上的其他业务内容摆在这里...</p>
        <p>留意右下角的智能助手小组件。</p>
    </div>

    <!-- 内嵌组件核心 HTML -->
    <div id="ai-chatbot-widget">
        <div class="chat-header">
            <span>✨ 教务智能助手</span>
        </div>
        <div class="chat-messages message-container" id="chat-box">
            <div class="message bot-msg">您好！我是高校教务智能助手，请问有什么关于课程安排或教师信息想要查询的吗？</div>
            <div id="loading-indicator" class="loading">正在查询数据库并生成回答...</div>
        </div>
        <div class="chat-input">
            <input type="text" id="chat-input-field" placeholder="例如：李圣炎老师教什么课？" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // 随机构造一个会话ID，刷新页面就换一个新的
        const sessionId = "web_session_" + Math.random().toString(36).substring(2, 9);
        // 如果前后端分离，需要写绝对路径（注意 FastAPI 要开启 CORS）
        const API_URL = "http://127.0.0.1:8000/chat"; 

        async function sendMessage() {
            const inputField = document.getElementById("chat-input-field");
            const text = inputField.value.trim();
            if (!text) return;

            // 1. 显示用户自己的消息
            appendMessage(text, "user-msg");
            inputField.value = "";

            // 2. 显示加载动画
            const loading = document.getElementById("loading-indicator");
            const chatBox = document.getElementById("chat-box");
            chatBox.appendChild(loading); // 把加载动画移到最底下
            loading.style.display = "block";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // 3. 向你的 FastAPI 后端发请求
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: text
                    })
                });

                if (!response.ok) throw new Error("网络响应异常");

                const result = await response.json();
                
                // 4. 追加 AI 的回复
                appendMessage(result.reply, "bot-msg");
            } catch (error) {
                console.error("对话拉取失败", error);
                appendMessage("抱歉，无法连接到智能助手服务器，请稍后再试。", "bot-msg");
            } finally {
                loading.style.display = "none";
            }
        }

        function appendMessage(text, className) {
            const chatBox = document.getElementById("chat-box");
            const loading = document.getElementById("loading-indicator");
            
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text; // 如果需要支持 markdown，可接入 marked.js
            
            // 确保消息插在加载动画的前面
            chatBox.insertBefore(msgDiv, loading); 
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
    </script>
</body>
</html>
